name: CI

on:
  push:
    branches: [main]
  # No base-branch filter: stacked PRs (feature -> feature) must run the gate
  # before merge too, not only after they retarget to main.
  pull_request:

jobs:
  captioner:
    name: captioner (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/captioner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        # requirements-dev.txt installs the CPU-only test deps (models are mocked in unit tests),
        # so CI does not need a GPU or the heavy ROCm wheels.
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest (unit + contract, models mocked)
        run: python -m pytest -q

  api:
    name: api (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: python -m pytest -q

  oracle:
    name: oracle (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/oracle
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest (Fireworks mocked)
        run: python -m pytest -q

  web:
    name: web (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint --workspace apps/web

      - name: Build (static export)
        run: npm run build --workspace apps/web
