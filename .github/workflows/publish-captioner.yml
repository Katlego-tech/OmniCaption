name: Publish captioner image

# Manual, on-demand build + push of the AMD/ROCm captioner image to Docker Hub.
# Runs in GitHub's clean-network environment (no notebook SSL proxy) so the
# CTranslate2-ROCm wheel (github.com) and Whisper weights (huggingface.co) download
# fine. The <10 GB judging gate is enforced by build_push.sh — the job FAILS if the
# image is >=10 GB and nothing is pushed.
#
# One-time setup (repo Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username
#   DOCKERHUB_TOKEN     a Docker Hub access token (Account Settings -> Security)
#
# After a successful run, the GPU smoke test still has to run on the gfx1100
# notebook: `docker pull <the pushed ref>` then services/captioner/scripts/smoke.sh.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. latest, v1, or a date)"
        default: "latest"
        required: true

jobs:
  build-push:
    name: build + gate (<10 GB) + push (or measure)
    runs-on: ubuntu-latest
    env:
      # Exposed so steps can detect whether Docker Hub creds are configured.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v5

      # The rocm/pytorch base + full builder stage need far more disk than the
      # ~21 GB a fresh runner has free. Reclaim the big preinstalled toolchains.
      - name: Free up disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          echo "After:"; df -h /

      # Try to log in when creds exist, but NEVER let a bad login abort the job —
      # the build + <10 GB gate must always run so we get the size. Push happens
      # in a later step only when this login actually succeeded.
      - name: Log in to Docker Hub
        id: dhlogin
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Always build + enforce the strict <10 GB gate. No push here (NO_PUSH), so
      # this succeeds/fails purely on build + size, independent of credentials.
      # FIREWORKS_API_KEY (repo secret) is baked into the image so the judge's
      # bare `docker run` produces real captions — no runtime secret needed.
      # Use a fresh disposable key (the image is public) and rotate after judging.
      - name: Build + enforce <10 GB gate
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          NO_PUSH=1 bash services/captioner/scripts/build_push.sh \
            "docker.io/${DOCKERHUB_USERNAME:-unset}" "${{ github.event.inputs.tag }}"

      # Push only when the login above actually succeeded.
      - name: Push to Docker Hub
        if: ${{ steps.dhlogin.outcome == 'success' }}
        run: |
          REF="docker.io/${DOCKERHUB_USERNAME}/omnicaption-captioner:${{ github.event.inputs.tag }}"
          docker push "$REF"
          echo "PUSHED: $REF"
          echo "NEXT: make the Docker Hub repo PUBLIC, then docker pull + smoke.sh on the gfx1100 notebook."

      - name: Note if not pushed
        if: ${{ env.DOCKERHUB_USERNAME == '' || steps.dhlogin.outcome != 'success' }}
        run: |
          echo "Built + size-gated OK, but NOT pushed."
          echo "Reason: ${DOCKERHUB_USERNAME:+login failed — check DOCKERHUB_TOKEN is a Docker Hub token (dckr_pat_...)}"
          echo "${DOCKERHUB_USERNAME:-No DOCKERHUB_USERNAME secret set.}"
